name: Node.js CD (Otomatik Dağıtım)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sunucuya Bağlan ve Güncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            cd /var/www/cengizdev
            mkdir -p /var/www/cengizdev
            cd /var/www/cengizdev
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone git@github.com:omercngiz/digitalocean.git .
            fi

            cat > apps/client/.env << 'EOF'
            NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
            CLERK_SECRET_KEY=${{ secrets.CLERK_SECRET_KEY }}
            NEXT_PUBLIC_CLERK_SIGN_IN_URL=/auth
            NEXT_PUBLIC_CLERK_SIGN_UP_URL=/auth
            NEXT_PUBLIC_CLERK_SIGN_IN_FALLBACK_REDIRECT_URL=/
            NEXT_PUBLIC_CLERK_SIGN_UP_FALLBACK_REDIRECT_URL=/
            EOF

            corepack enable
            corepack prepare pnpm@10.32.1 --activate
            pnpm install
            pnpm build

            pm2 delete cengizdev-app || true
            cd apps/client
            pm2 start "pnpm start" --name "cengizdev-app"
            cd ../..
            pm2 save
