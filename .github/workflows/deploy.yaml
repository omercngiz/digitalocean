name: Node.js CD (Otomatik Dağıtım)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sunucuya Bağlan ve Güncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 0. nvm ortamını yükle (node, corepack, pnpm, pm2 PATH'e eklensin)
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            # 1. Klasöre git ve SSH anahtarını tanıması için bir ayar ekle
            mkdir -p /var/www/cengizdev
            cd /var/www/cengizdev
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts

            # 2. Git işlemi (SSH Linki ile)
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone git@github.com:omercngiz/digitalocean.git .
            fi

            # 3. pnpm ile bağımlılıkları kur ve build et
            corepack enable
            corepack prepare pnpm@10.32.1 --activate
            pnpm install
            pnpm build

            # 4. PM2 ile uygulamayı başlat
            pm2 delete cengizdev-app || true
            pm2 start apps/api/dist/app.js --name "cengizdev-app"
            pm2 save
