name: Node.js CD (Otomatik Dağıtım)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sunucuya Bağlan ve Güncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Yol (PATH) tanımlamasını yapalım ki npm/pm2 bulunsun
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/bin:/usr/local/bin:$HOME/.npm-global/bin
            
            # 2. Klasöre git
            mkdir -p /var/www/cengizdev
            cd /var/www/cengizdev
            
            # 3. Git işlemini "token" ile yapalım (Şifre sormaması için)
            # Eğer reponuz PUBLIC ise bu satır yeterli:
            if [ -d ".git" ]; then
              git pull origin main
            else
              git clone https://github.com/omercngiz/digitalocean.git .
            fi
            
            # 4. Bağımlılıklar ve Uygulamayı Başlat
            npm install
            pm2 delete cengizdev-app || true
            pm2 start index.js --name "cengizdev-app"